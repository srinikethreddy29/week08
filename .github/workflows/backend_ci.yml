# week08/.github/workflows/backend_ci.yml
name: Backend CI - Test, Build and Push Images to ACR

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend_ci.yml'

# Use the secrets you created earlier
env:
  ACR_NAME: ${{ secrets.ACR_NAME }}                   # e.g. sit722w086901
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}   # e.g. sit722w086901.azurecr.io
  IMAGE_TAG: latest                                   # keep 'latest' to match your k8s manifests

jobs:
  # Job 1: run tests for both backends
  test_and_lint_backends:
    runs-on: ubuntu-latest
    services:
      product-db:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: products
        ports: [ "5432:5432" ]
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s --health-timeout=5s --health-retries=5
      order-db:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: orders
        ports: [ "5433:5432" ]
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s --health-timeout=5s --health-retries=5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install & Test Product service
        working-directory: backend/product-service
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: products
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        run: |
          npm ci
          npm test --if-present

      - name: Install & Test Order service
        working-directory: backend/order-service
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5433
          POSTGRES_DB: orders
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        run: |
          npm ci
          npm test --if-present

  # Job 2: build and push images (only if tests pass)
  build_and_push_images:
    needs: test_and_lint_backends
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to Azure Container Registry
        run: az acr login --name "$ACR_NAME"

      - name: Build & Push Product Service Image
        working-directory: backend/product-service
        run: |
          docker build -t "$ACR_LOGIN_SERVER/product-service:$IMAGE_TAG" .
          docker push "$ACR_LOGIN_SERVER/product-service:$IMAGE_TAG"

      - name: Build & Push Order Service Image
        working-directory: backend/order-service
        run: |
          docker build -t "$ACR_LOGIN_SERVER/order-service:$IMAGE_TAG" .
          docker push "$ACR_LOGIN_SERVER/order-service:$IMAGE_TAG"

      - name: Logout from Azure
        if: always()
        run: az logout